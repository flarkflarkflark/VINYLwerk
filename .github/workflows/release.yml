name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build and Create Release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev libfreetype6-dev libfontconfig1-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev libgtk-3-dev

      - name: Configure CMake
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DCMAKE_OSX_DEPLOYMENT_TARGET="13.0"
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Collect and Package
        shell: bash
        run: |
          mkdir -p release-files
          VERSION=${{ github.ref_name }}
          
          echo "=== Searching for CLI executable ==="
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            CLI_BIN=$(find build -name "vinylwerk_cli.exe" | head -1)
          else
            CLI_BIN=$(find build -name "vinylwerk_cli" | head -1)
          fi
          
          if [ -n "$CLI_BIN" ]; then
            echo "Found executable: $CLI_BIN"
            cp "$CLI_BIN" release-files/
            
            # Package ReaScript alongside the executable
            if [ -f "Scripts/VINYLwerk.lua" ]; then
              cp Scripts/VINYLwerk.lua release-files/
            fi
            
            cd release-files
            if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
              zip -r "VINYLwerk-Windows-$VERSION.zip" vinylwerk_cli.exe VINYLwerk.lua
            elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
              # Make macOS binary executable inside the zip
              chmod +x vinylwerk_cli
              zip -r "VINYLwerk-macOS-$VERSION.zip" vinylwerk_cli VINYLwerk.lua
            else
              chmod +x vinylwerk_cli
              zip -r "VINYLwerk-Linux-$VERSION.zip" vinylwerk_cli VINYLwerk.lua
            fi
            cd ..
          else
            echo "Warning: Executable not found!"
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
